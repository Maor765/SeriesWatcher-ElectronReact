<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SeriesWatcher — Grid Mockup</title>
<style>
  :root[data-theme='dark'] {
    --bg:            #0d1117;
    --surface:       #161b22;
    --surface2:      #1c2128;
    --border:        #30363d;
    --border-soft:   #21262d;
    --text-primary:  #e6edf3;
    --text-secondary:#8b949e;
    --text-muted:    #484f58;
    --input-bg:      #0d1117;
    --row-alt:       #111820;
    --scrollbar:     #30363d;
    --shadow:        rgba(0,0,0,0.5);

    --c-ending:        #58a6ff;
    --c-ending-dim:    #102030;
    --c-upcoming:      #3fb950;
    --c-upcoming-dim:  #0e2010;
    --c-fallending:    #e3b341;
    --c-fallending-dim:#281e08;
    --c-unknown:       #bc8cff;
    --c-unknown-dim:   #1e1030;
    --c-upmovies:      #22d3ee;
    --c-upmovies-dim:  #062028;
    --c-israeli:       #f472b6;
    --c-israeli-dim:   #2a0a18;

    --past-bg:       #272012;
    --past-text:     #e3b341;
    --del-bg:        #2a1010;
    --del-text:      #f85149;
    --accent:        #58a6ff;
    --accent-text:   #0d1117;
  }
  :root[data-theme='light'] {
    --bg:            #f6f8fa;
    --surface:       #ffffff;
    --surface2:      #f0f3f6;
    --border:        #d0d7de;
    --border-soft:   #e8ebee;
    --text-primary:  #1f2328;
    --text-secondary:#656d76;
    --text-muted:    #9198a1;
    --input-bg:      #f6f8fa;
    --row-alt:       #f0f3f6;
    --scrollbar:     #d0d7de;
    --shadow:        rgba(0,0,0,0.08);

    --c-ending:        #0969da;
    --c-ending-dim:    #dbeafe;
    --c-upcoming:      #1a7f37;
    --c-upcoming-dim:  #d1fae5;
    --c-fallending:    #9a6700;
    --c-fallending-dim:#fef9c3;
    --c-unknown:       #7c3aed;
    --c-unknown-dim:   #ede9fe;
    --c-upmovies:      #0891b2;
    --c-upmovies-dim:  #cffafe;
    --c-israeli:       #db2777;
    --c-israeli-dim:   #fce7f3;

    --past-bg:       #fef9c3;
    --past-text:     #92400e;
    --del-bg:        #fee2e2;
    --past-bg:       #fef9c3;
    --past-text:     #92400e;
    --del-bg:        #fee2e2;
    --del-text:      #dc2626;
    --accent:        #0969da;
    --accent-text:   #ffffff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    background: var(--bg);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

  /* ── Top Bar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 10px;
    box-shadow: 0 1px 12px var(--shadow);
    z-index: 10;
  }
  .topbar-title {
    font-size: 15px;
    font-weight: 800;
    background: linear-gradient(90deg, #58a6ff, #bc8cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
    letter-spacing: -0.3px;
  }
  .topbar-right { display: flex; align-items: center; gap: 7px; }

  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .search-icon {
    position: absolute;
    left: 9px;
    color: var(--text-muted);
    font-size: 12px;
    pointer-events: none;
  }
  .search-input {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 11px 5px 28px;
    color: var(--text-primary);
    font-size: 12px;
    width: 220px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit;
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
  }
  .search-input::placeholder { color: var(--text-muted); }

  .btn-topbar {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 5px 12px;
    color: var(--text-secondary);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    font-weight: 500;
  }
  .btn-topbar:hover { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, var(--surface2)); }

  /* ── Counts strip ── */
  .counts-strip {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 6px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border-soft);
    flex-shrink: 0;
  }
  .count-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .count-chip .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .count-chip strong { color: var(--text-primary); font-weight: 700; }

  /* ── Grid ── */
  .grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 10px;
    padding: 10px;
    overflow: hidden;
    min-height: 0;
  }

  /* ── Panel ── */
  .panel {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 2px 12px var(--shadow);
    transition: box-shadow 0.2s;
    min-height: 0;
  }
  .panel:hover { box-shadow: 0 4px 20px var(--shadow); }

  .panel-header {
    display: flex;
    align-items: center;
    padding: 9px 12px 8px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border-soft);
  }
  .panel-header-left { display: flex; align-items: center; gap: 8px; }
  .panel-icon { font-size: 15px; line-height: 1; }
  .panel-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .panel-badge {
    font-size: 10px;
    font-weight: 700;
    border-radius: 10px;
    padding: 2px 7px;
    min-width: 22px;
    text-align: center;
    transition: background 0.2s;
  }
  .btn-add-primary {
    background: var(--accent);
    border: none;
    border-radius: 7px;
    padding: 5px 14px;
    color: var(--accent-text);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }
  .btn-add-primary:hover { opacity: 0.85; }

  /* Per-panel color theming */
  .panel-ending   { --pc: var(--c-ending);    --pd: var(--c-ending-dim);    border-top: 2px solid var(--c-ending);    }
  .panel-upcoming { --pc: var(--c-upcoming);  --pd: var(--c-upcoming-dim);  border-top: 2px solid var(--c-upcoming);  }
  .panel-fall     { --pc: var(--c-fallending);--pd: var(--c-fallending-dim);border-top: 2px solid var(--c-fallending);}
  .panel-unknown  { --pc: var(--c-unknown);   --pd: var(--c-unknown-dim);   border-top: 2px solid var(--c-unknown);   }
  .panel-upmovies { --pc: var(--c-upmovies);  --pd: var(--c-upmovies-dim);  border-top: 2px solid var(--c-upmovies);  }
  .panel-israeli  { --pc: var(--c-israeli);   --pd: var(--c-israeli-dim);   border-top: 2px solid var(--c-israeli);   }

  .panel .panel-title { color: var(--pc); }
  .panel .panel-badge { background: var(--pd); color: var(--pc); }
  .panel thead th    { color: var(--pc); }

  /* ── Table inside panel ── */
  .panel-scroll { flex: 1; overflow-y: auto; min-height: 0; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .col-name { width: 52%; }
  .col-date { width: 26%; }
  .col-act  { width: 22%; }

  thead th {
    background: var(--surface2);
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    padding: 5px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border-soft);
    position: sticky;
    top: 0;
    z-index: 1;
  }
  tbody td {
    padding: 6px 10px;
    font-size: 12px;
    border-bottom: 1px solid var(--border-soft);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr.row-alt td { background: var(--row-alt); }
  tbody tr.row-past td { background: var(--past-bg); }
  tbody tr.row-past .cell-date { color: var(--past-text); font-weight: 700; font-size: 11px; }

  .act-cell { text-align: right; padding-right: 8px !important; }
  .btn-a {
    border: none; border-radius: 4px;
    font-size: 10px; padding: 2px 6px;
    cursor: pointer; margin-left: 2px;
    font-family: inherit; line-height: 1.5;
    transition: opacity 0.12s, background 0.12s;
  }
  .btn-e  { background: var(--pd,var(--border)); color: var(--pc,var(--accent)); }
  .btn-e:hover { opacity: 0.75; }
  .btn-d  { background: var(--del-bg); color: var(--del-text); }
  .btn-d:hover { opacity: 0.75; }
  .btn-s  { background: var(--surface2); color: var(--text-secondary); border: 1px solid var(--border) !important; }
  .btn-s:hover { color: var(--pc,var(--accent)); border-color: var(--pc,var(--accent)) !important; }

  .empty-cell {
    text-align: center; color: var(--text-muted);
    padding: 18px 10px !important; font-size: 11px; font-style: italic;
  }

  /* ── Search overlay ── */
  .search-overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    z-index: 20;
    flex-direction: column;
    overflow: hidden;
  }
  .search-overlay.visible { display: flex; }
  .search-overlay-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .search-overlay-header h3 { font-size: 13px; color: var(--accent); font-weight: 700; }
  .search-overlay-header span { color: var(--text-secondary); font-size: 12px; }
  .btn-close-search {
    margin-left: auto;
    background: none; border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px;
    color: var(--text-secondary); font-size: 12px;
    cursor: pointer; font-family: inherit;
  }
  .btn-close-search:hover { border-color: var(--del-text); color: var(--del-text); }
  .search-table-wrap { flex: 1; overflow-y: auto; padding: 12px 18px; }
  .search-results-table { width: 100%; border-collapse: collapse; }
  .search-results-table th {
    text-align: left; font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.7px;
    color: var(--accent); padding: 6px 10px;
    border-bottom: 2px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 1;
  }
  .search-results-table td { padding: 7px 10px; font-size: 12px; border-bottom: 1px solid var(--border-soft); }
  .search-results-table tr:hover td { background: var(--surface2); }

  .pill {
    display: inline-block; font-size: 9px; font-weight: 700;
    padding: 2px 8px; border-radius: 10px;
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .pill-e { background: var(--c-ending-dim);    color: var(--c-ending);    }
  .pill-u { background: var(--c-upcoming-dim);  color: var(--c-upcoming);  }
  .pill-f { background: var(--c-fallending-dim);color: var(--c-fallending);}
  .pill-k { background: var(--c-unknown-dim);   color: var(--c-unknown);   }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 200; backdrop-filter: blur(3px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    width: 380px;
    box-shadow: 0 16px 60px rgba(0,0,0,0.5);
    animation: pop 0.18s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop { from { transform: scale(0.93); opacity:0 } to { transform: scale(1); opacity:1 } }
  .modal h2 { font-size: 16px; font-weight: 800; margin-bottom: 20px; color: var(--accent); }
  .modal form { display: flex; flex-direction: column; gap: 14px; }
  .modal label { display: flex; flex-direction: column; gap: 5px; }
  .modal label span {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.7px; color: var(--text-secondary); font-weight: 600;
  }
  .modal input, .modal select {
    background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px;
    color: var(--text-primary); font-size: 13px;
    outline: none; font-family: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .modal input:focus, .modal select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
  }
  .modal select option { background: var(--surface); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
  .btn-cancel {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 18px;
    color: var(--text-secondary); font-size: 13px; cursor: pointer; font-family: inherit;
  }
  .btn-save {
    background: var(--accent); border: none; border-radius: 8px;
    padding: 9px 22px; color: var(--accent-text);
    font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .btn-save:hover { opacity: 0.85; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 10px 18px; border-radius: 10px;
    font-size: 13px; font-weight: 500; display: none;
    box-shadow: 0 4px 20px var(--shadow);
    z-index: 300;
    border-left: 3px solid var(--accent);
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <span class="topbar-title">📺 SeriesWatcher</span>
  <div class="topbar-right">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text"
             placeholder="Search all series..." oninput="handleSearch(this.value)" />
    </div>
    <button class="btn-add-primary" onclick="openModal('Ending')">+ Add Series</button>
    <button class="btn-topbar" onclick="toggleTheme()" id="themeBtn">☀️</button>
  </div>
</div>

<!-- COUNTS STRIP -->
<div class="counts-strip" id="countsStrip">
  <div class="count-chip"><div class="dot" style="background:var(--c-ending)"></div>Ending <strong id="n-Ending">5</strong></div>
  <div class="count-chip"><div class="dot" style="background:var(--c-upcoming)"></div>UpComing <strong id="n-UpComing">4</strong></div>
  <div class="count-chip"><div class="dot" style="background:var(--c-fallending)"></div>Fall Ending <strong id="n-FallEnding">3</strong></div>
  <div class="count-chip"><div class="dot" style="background:var(--c-unknown)"></div>Unknown <strong id="n-Unknown">2</strong></div>
  <div class="count-chip"><div class="dot" style="background:var(--c-upmovies)"></div>Movies <strong id="n-UpcomingMovies">3</strong></div>
  <div class="count-chip"><div class="dot" style="background:var(--c-israeli)"></div>Israeli <strong id="n-Israeli">3</strong></div>
  <span style="margin-left:auto;color:var(--text-muted);font-size:11px" id="totalCount">20 total</span>
</div>

<!-- GRID -->
<div class="grid" id="mainGrid">

  <!-- Ending -->
  <div class="panel panel-ending">
    <div class="panel-header">
      <div class="panel-header-left">
        <span class="panel-icon">🔚</span>
        <span class="panel-title">Ending</span>
        <span class="panel-badge" id="badge-Ending">5</span>
      </div>
    </div>
    <div class="panel-scroll">
      <table>
        <colgroup><col class="col-name"/><col class="col-date"/><col class="col-act"/></colgroup>
        <thead><tr><th>Name</th><th>Date</th><th></th></tr></thead>
        <tbody id="tbody-Ending"></tbody>
      </table>
    </div>
  </div>

  <!-- UpComing -->
  <div class="panel panel-upcoming">
    <div class="panel-header">
      <div class="panel-header-left">
        <span class="panel-icon">📅</span>
        <span class="panel-title">UpComing</span>
        <span class="panel-badge" id="badge-UpComing">4</span>
      </div>
    </div>
    <div class="panel-scroll">
      <table>
        <colgroup><col class="col-name"/><col class="col-date"/><col class="col-act"/></colgroup>
        <thead><tr><th>Name</th><th>Date</th><th></th></tr></thead>
        <tbody id="tbody-UpComing"></tbody>
      </table>
    </div>
  </div>

  <!-- Fall Ending -->
  <div class="panel panel-fall">
    <div class="panel-header">
      <div class="panel-header-left">
        <span class="panel-icon">🍂</span>
        <span class="panel-title">Fall Ending</span>
        <span class="panel-badge" id="badge-FallEnding">3</span>
      </div>
    </div>
    <div class="panel-scroll">
      <table>
        <colgroup><col class="col-name"/><col class="col-date"/><col class="col-act"/></colgroup>
        <thead><tr><th>Name</th><th>Date</th><th></th></tr></thead>
        <tbody id="tbody-FallEnding"></tbody>
      </table>
    </div>
  </div>

  <!-- Unknown -->
  <div class="panel panel-unknown">
    <div class="panel-header">
      <div class="panel-header-left">
        <span class="panel-icon">❓</span>
        <span class="panel-title">Unknown</span>
        <span class="panel-badge" id="badge-Unknown">2</span>
      </div>
    </div>
    <div class="panel-scroll">
      <table>
        <colgroup><col class="col-name"/><col class="col-date"/><col class="col-act"/></colgroup>
        <thead><tr><th>Name</th><th>Last Check</th><th></th></tr></thead>
        <tbody id="tbody-Unknown"></tbody>
      </table>
    </div>
  </div>

  <!-- Upcoming Movies -->
  <div class="panel panel-upmovies">
    <div class="panel-header">
      <div class="panel-header-left">
        <span class="panel-icon">🎬</span>
        <span class="panel-title">Upcoming Movies</span>
        <span class="panel-badge" id="badge-UpcomingMovies">3</span>
      </div>
    </div>
    <div class="panel-scroll">
      <table>
        <colgroup><col class="col-name"/><col class="col-date"/><col class="col-act"/></colgroup>
        <thead><tr><th>Name</th><th>Date</th><th></th></tr></thead>
        <tbody id="tbody-UpcomingMovies"></tbody>
      </table>
    </div>
  </div>

  <!-- Israeli -->
  <div class="panel panel-israeli">
    <div class="panel-header">
      <div class="panel-header-left">
        <span class="panel-icon">🇮🇱</span>
        <span class="panel-title">Israeli</span>
        <span class="panel-badge" id="badge-Israeli">3</span>
      </div>
    </div>
    <div class="panel-scroll">
      <table>
        <colgroup><col class="col-name"/><col class="col-date"/><col class="col-act"/></colgroup>
        <thead><tr><th>Name</th><th>Date</th><th></th></tr></thead>
        <tbody id="tbody-Israeli"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-overlay-header">
    <h3>Search Results</h3>
    <span id="searchSubtitle"></span>
    <button class="btn-close-search" onclick="clearSearch()">✕ Clear</button>
  </div>
  <div class="search-table-wrap">
    <table class="search-results-table">
      <colgroup><col style="width:42%"/><col style="width:16%"/><col style="width:18%"/><col style="width:24%"/></colgroup>
      <thead>
        <tr><th>Name</th><th>List</th><th>Date</th><th style="text-align:right;padding-right:10px">Actions</th></tr>
      </thead>
      <tbody id="searchTbody"></tbody>
    </table>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modalTitle">Add Series</h2>
    <form onsubmit="saveModal(event)">
      <label><span>Name *</span>
        <input type="text" id="mName" placeholder="e.g. Breaking Bad" required />
      </label>
      <label><span>Date</span>
        <input type="date" id="mDate" />
      </label>
      <label><span>List</span>
        <select id="mList">
          <option value="Ending">Ending</option>
          <option value="UpComing">UpComing</option>
          <option value="FallEnding">Fall Ending</option>
          <option value="Unknown">Unknown</option>
          <option value="UpcomingMovies">Upcoming Movies</option>
          <option value="Israeli">Israeli</option>
        </select>
      </label>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-save">Save</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DATA = [
  {id:1,  name:"The Last of Us",       date:"20260114", list:"Ending"    },
  {id:2,  name:"Severance S3",          date:"20260322", list:"Ending"    },
  {id:3,  name:"House of the Dragon",   date:"20260531", list:"Ending"    },
  {id:4,  name:"The Boys",              date:"20250915", list:"Ending"    },
  {id:5,  name:"Andor",                 date:"20251201", list:"Ending"    },
  {id:6,  name:"Stranger Things 5",     date:"20261015", list:"UpComing"  },
  {id:7,  name:"The Mandalorian S4",    date:"20260820", list:"UpComing"  },
  {id:8,  name:"Squid Game S3",         date:"20260701", list:"UpComing"  },
  {id:9,  name:"Peaky Blinders Film",   date:"20270101", list:"UpComing"  },
  {id:10, name:"Better Call Saul",      date:"20250810", list:"FallEnding"},
  {id:11, name:"Ozark",                 date:"20251130", list:"FallEnding"},
  {id:12, name:"Succession",            date:"20260901", list:"FallEnding"},
  {id:13, name:"Dark Season 4",         date:"20260215", list:"Unknown"       },
  {id:14, name:"The Wire Reboot",       date:"20260101", list:"Unknown"       },
  {id:15, name:"Avatar 3",              date:"20261219", list:"UpcomingMovies"},
  {id:16, name:"Mission Impossible 8",  date:"20250523", list:"UpcomingMovies"},
  {id:17, name:"Avengers Doomsday",     date:"20260501", list:"UpcomingMovies"},
  {id:18, name:"Fauda S5",              date:"20260310", list:"Israeli"       },
  {id:19, name:"Tehran S3",             date:"20251105", list:"Israeli"       },
  {id:20, name:"Valley of Tears S2",    date:"20261001", list:"Israeli"       },
];
let nextId = 21, editId = null;
const today = new Date().toISOString().slice(0,10).replace(/-/g,'');

const PILL  = { Ending:'pill-e', UpComing:'pill-u', FallEnding:'pill-f', Unknown:'pill-k', UpcomingMovies:'pill-m', Israeli:'pill-i' };
const LABEL = { Ending:'Ending', UpComing:'UpComing', FallEnding:'Fall Ending', Unknown:'Unknown', UpcomingMovies:'Upcoming Movies', Israeli:'Israeli' };

const fmt = d => d&&d.length===8 ? `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}` : d;
const isPast = d => d < today;

function actBtns(id) {
  return `<td class="act-cell">
    <button class="btn-a btn-e" onclick="openEdit(${id})">✏️</button>
    <button class="btn-a btn-d" onclick="delRow(${id})">🗑</button>
    <button class="btn-a btn-s" onclick="myep(${id})">🔍</button>
  </td>`;
}

function renderPanel(list) {
  const rows = DATA.filter(r=>r.list===list).sort((a,b)=>a.date.localeCompare(b.date));
  const tbody = document.getElementById('tbody-'+list);
  const badge = document.getElementById('badge-'+list);
  const n = document.getElementById('n-'+list);
  badge.textContent = rows.length;
  if (n) n.textContent = rows.length;

  if (!rows.length) {
    tbody.innerHTML = `<tr><td class="empty-cell" colspan="3">Empty — click + Add</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map((r,i) => {
    const past = list !== 'Unknown' && isPast(r.date);
    const cls  = past ? 'row-past' : i%2===1 ? 'row-alt' : '';
    return `<tr class="${cls}" title="${past ? '⚠ Date has passed' : ''}">
      <td>${r.name}</td>
      <td class="cell-date">${fmt(r.date)}</td>
      ${actBtns(r.id)}
    </tr>`;
  }).join('');
}

function renderAll() {
  ['Ending','UpComing','FallEnding','Unknown','UpcomingMovies','Israeli'].forEach(renderPanel);
  document.getElementById('totalCount').textContent = DATA.length + ' total';
}

function handleSearch(q) {
  const ov = document.getElementById('searchOverlay');
  const grid = document.getElementById('mainGrid');
  const strip = document.getElementById('countsStrip');
  if (!q.trim()) {
    ov.classList.remove('visible');
    grid.style.display = '';
    strip.style.display = '';
    return;
  }
  const found = DATA.filter(r => r.name.toLowerCase().includes(q.trim().toLowerCase()));
  ov.classList.add('visible');
  grid.style.display = 'none';
  strip.style.display = 'none';
  document.getElementById('searchSubtitle').textContent =
    found.length ? `${found.length} result${found.length!==1?'s':''} for "${q.trim()}"` : `No results`;

  document.getElementById('searchTbody').innerHTML = found.length
    ? found.map((r,i) => {
        const past = r.list!=='Unknown' && isPast(r.date);
        const cls  = past?'row-past':i%2?'row-alt':'';
        return `<tr class="${cls}">
          <td>${r.name}</td>
          <td><span class="pill ${PILL[r.list]}">${LABEL[r.list]}</span></td>
          <td class="cell-date">${fmt(r.date)}</td>
          ${actBtns(r.id)}
        </tr>`;
      }).join('')
    : `<tr><td colspan="4" class="empty-cell">No results found</td></tr>`;
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  handleSearch('');
}

function delRow(id) {
  const i = DATA.findIndex(r=>r.id===id);
  if (i<0) return;
  const name = DATA[i].name;
  DATA.splice(i,1);
  renderAll();
  const q = document.getElementById('searchInput').value;
  if (q.trim()) handleSearch(q);
  toast(`🗑 Deleted "${name}"`);
}

function openModal(list) {
  editId = null;
  document.getElementById('modalTitle').textContent = 'Add Series';
  document.getElementById('mName').value = '';
  document.getElementById('mDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('mList').value = list;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('mName').focus(),80);
}

function openEdit(id) {
  const r = DATA.find(r=>r.id===id);
  editId = id;
  document.getElementById('modalTitle').textContent = 'Edit Series';
  document.getElementById('mName').value = r.name;
  document.getElementById('mDate').value = fmt(r.date);
  document.getElementById('mList').value = r.list;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('mName').focus(),80);
}

function saveModal(e) {
  e.preventDefault();
  const name = document.getElementById('mName').value.trim();
  const date = document.getElementById('mDate').value.replace(/-/g,'');
  const list = document.getElementById('mList').value;
  if (editId) {
    const r = DATA.find(r=>r.id===editId);
    r.name=name; r.date=date; r.list=list;
    toast(`✅ Updated "${name}"`);
  } else {
    DATA.push({id:nextId++, name, date, list});
    toast(`✅ Added "${name}"`);
  }
  closeModal();
  renderAll();
  const q = document.getElementById('searchInput').value;
  if (q.trim()) handleSearch(q);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if(e.target.id==='modalOverlay') closeModal(); }

function myep(id) {
  const r = DATA.find(r=>r.id===id);
  if(r) toast(`🔍 Opening MyEpisodes for "${r.name}"`);
}

function fakeImport() { toast('⬆ Imported 14 series (0 skipped)'); }

let tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(tt); tt = setTimeout(()=>{el.style.display='none';}, 3000);
}

function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme', dark?'light':'dark');
  document.getElementById('themeBtn').textContent = dark?'🌙':'☀️';
}

renderAll();
</script>
</body>
</html>
